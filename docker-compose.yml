services:
  db:
    image: postgres:16-alpine
    container_name: clinic-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: clinic
      POSTGRES_PASSWORD: clinic
      POSTGRES_DB: clinic
    ports:
      - "5432:5432"
    volumes:
      - clinic-pgdata:/var/lib/postgresql/data

volumes:
  clinic-pgdata:
